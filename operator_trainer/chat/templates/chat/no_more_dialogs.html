<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Нет активных сценариев</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: #0f172a;
            color: #e5e7eb;
            font-family: Inter, Arial, sans-serif;
            text-align: center;
        }
        .card {
            max-width: 520px;
            padding: 32px;
            border: 1px solid #334155;
            border-radius: 20px;
            background: #111827;
        }
        p {
            color: #94a3b8;
            line-height: 1.5;
        }
        a {
            display: inline-flex;
            margin-top: 16px;
            padding: 10px 16px;
            border-radius: 999px;
            background: #3b82f6;
            color: white;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>{{ message }}</h1>
        <p>Администратор может добавить сценарии вручную или выполнить команду <code>python manage.py seed_scenarios</code>.</p>
        <a href="{% url 'logout' %}">Выйти</a>
    </main>
</body>
</html>
